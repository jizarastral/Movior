# Render Static Site — matches dashboard "Publish directory: out"
services:
  - type: web
    name: movior
    runtime: static
    plan: free
    branch: main
    autoDeployTrigger: commit
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: out
    envVars:
      - key: NODE_VERSION
        value: "20"
